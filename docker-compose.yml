services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-escobar_club}
      MYSQL_USER: ${DB_USERNAME:-escobar}
      MYSQL_PASSWORD: ${DB_PASSWORD:-escobar}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-escobar_root}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-escobar_root}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-escobar_club}
      DB_USERNAME: ${DB_USERNAME:-escobar}
      DB_PASSWORD: ${DB_PASSWORD:-escobar}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_ACCESS_TTL_MINUTES: ${JWT_ACCESS_TTL_MINUTES:-15}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-7}
      UPLOAD_DIR: /app/uploads
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      APIFY_API_TOKEN: ${APIFY_API_TOKEN:?APIFY_API_TOKEN must be set}
      APIFY_ACTOR_ID: ${APIFY_ACTOR_ID:-apify~instagram-scraper}
      APIFY_BASE_URL: ${APIFY_BASE_URL:-https://api.apify.com/v2}
      APIFY_TIMEOUT_MS: ${APIFY_TIMEOUT_MS:-120000}
      METRICS_SYNC_MIN_INTERVAL_MINUTES: ${METRICS_SYNC_MIN_INTERVAL_MINUTES:-15}
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql_data:
  uploads_data:
