spring:
  application:
    name: escobar-club
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-every-environment-please-32bytes+}
    access-token-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:15}
    refresh-token-ttl-days: ${JWT_REFRESH_TTL_DAYS:7}
  storage:
    provider: ${STORAGE_PROVIDER:local}
    upload-dir: ${UPLOAD_DIR:./uploads}
    base-url: ${UPLOAD_BASE_URL:/media}
    max-file-size-bytes: ${UPLOAD_MAX_BYTES:20971520}
    allowed-image-types: image/png,image/jpeg,image/webp,image/gif
    allowed-video-types: video/mp4,video/quicktime,video/webm
    allowed-document-types: application/pdf
    r2:
      account-id: ${R2_ACCOUNT_ID:}
      bucket: ${R2_BUCKET:}
      access-key: ${R2_ACCESS_KEY:}
      secret-key: ${R2_SECRET_KEY:}
      public-base-url: ${R2_PUBLIC_BASE_URL:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  apify:
    base-url: ${APIFY_BASE_URL:https://api.apify.com/v2}
    actor-id: ${APIFY_ACTOR_ID:apify~instagram-scraper}
    token: ${APIFY_API_TOKEN:}
    timeout-ms: ${APIFY_TIMEOUT_MS:120000}
  metrics-sync:
    min-interval-minutes: ${METRICS_SYNC_MIN_INTERVAL_MINUTES:15}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
